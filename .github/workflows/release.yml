name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    # Needed for creating the version PR and pushing tags after publish
    permissions:
      contents: write
      pull-requests: write

    env:
      # Used by actions/setup-node to authenticate to npm (writes .npmrc)
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so tags can be created/pushed reliably
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          registry-url: https://registry.npmjs.org
          always-auth: true
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # This step will:
      # - Open or update a "Version Packages" PR when changesets exist.
      # - When that PR is merged into main, it will run the publish script.
      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # Use repo scripts that wrap Changesets for pnpm monorepo
          version: pnpm run release:version
          publish: pnpm run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Redundant with job-level env, but explicit for clarity
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Push git tags created during publish
        if: steps.changesets.outputs.published == 'true'
        run: git push --follow-tags
