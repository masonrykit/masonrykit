name: Feature Request
description: Suggest a new capability or improvement
title: '[Feature]: '
labels: ['enhancement', 'triage']
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to share an idea! A few prompts to help us
        understand what you need and whether it fits the library's scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user need first, not the implementation. What are you trying to do that's hard or impossible today?
      placeholder: 'I want to show a masonry gallery where items can be dragged to reorder, but I had to reach for an external library because...'
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / behavior
      description: What would the API look like? Sketch imports, options, function signatures, or UX — whatever level of detail you have.
      render: typescript
      placeholder: |
        useMasonry(cells, {
          onReorder: (nextCells) => { ... },
        })
    validations:
      required: false

  - type: dropdown
    id: package
    attributes:
      label: Which package would this live in?
      multiple: true
      options:
        - '@masonrykit/core'
        - '@masonrykit/browser'
        - '@masonrykit/react'
        - 'Not sure'
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other libraries, patterns, or workarounds you've tried or looked at. Helps us understand the gap.
      placeholder: 'I tried @dnd-kit on top of the existing hook but ran into ...'

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links to prior art, performance numbers — anything else that helps.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I've searched existing issues and this hasn't already been proposed
          required: true
        - label: This fits the library's scope (headless, framework-agnostic math + DOM + React bindings), not a broader app concern
          required: true
        - label: I'd be interested in helping implement this
          required: false
