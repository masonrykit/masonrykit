# MasonryKit pnpm workspace configuration
# See: https://pnpm.io/pnpm-workspace_yaml

packages:
  - 'packages/*'
  - 'apps/*'
  - '!**/dist/**'
  - '!**/build/**'

# pnpm-specific resolution defaults. Keeping these here (not in `.npmrc`)
# avoids noisy "Unknown project config" warnings from npm 10/11 and is
# future-proof against npm 12, which will reject unknown keys.
resolutionMode: highest
strictPeerDependencies: true
autoInstallPeers: true
saveWorkspaceProtocol: rolling

# Single source of truth for every tooling dependency version. Workspace
# packages reference these via `"pkg": "catalog:"` so bumps only need to
# happen here.
# https://pnpm.io/catalogs
catalog:
  # React runtime & types (consumed by apps + packages/react's dev test deps)
  react: 19.2.5
  react-dom: 19.2.5
  '@types/react': 19.2.14
  '@types/react-dom': 19.2.3

  # Node types
  '@types/node': 25.6.0

  # TypeScript & build
  typescript: 6.0.3
  tsdown: 0.21.10

  # Publish quality gates
  publint: 0.3.18
  '@arethetypeswrong/core': 0.18.2

  # Vite & Tailwind
  vite: 8.0.10
  '@vitejs/plugin-react': 6.0.1
  tailwindcss: 4.2.4
  '@tailwindcss/vite': 4.2.4

  # Vitest
  vitest: 4.1.5
  '@vitest/browser': 4.1.5
  '@vitest/browser-playwright': 4.1.5
  '@vitest/coverage-v8': 4.1.5
  '@vitest/ui': 4.1.5
  vitest-browser-react: 2.2.0
  jsdom: 29.0.2
  playwright: 1.59.1

  # Lint & format
  oxlint: 1.61.0
  oxlint-tsgolint: 0.21.1
  oxfmt: 0.46.0
  knip: 6.6.1
  lefthook: 2.1.6

  # Release
  '@changesets/cli': 2.31.0
  '@changesets/changelog-github': 0.6.0
