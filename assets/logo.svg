<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="256"
  height="256"
  viewBox="0 0 256 256"
  role="img"
  aria-label="MasonryKit Logo"
>
  <defs>
    <linearGradient id="mkGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="mkGradientAlt" x1="1" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect x="0" y="0" width="256" height="256" rx="28" ry="28"/>
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <g clip-path="url(#rounded)">
    <rect width="256" height="256" fill="url(#mkGradient)"/>
    <rect width="256" height="256" fill="url(#mkGradientAlt)" opacity="0.15"/>
  </g>

  <!-- Masonry blocks (symbolic) -->
  <g transform="translate(28,28)" filter="url(#softShadow)">
    <!-- Column 1 -->
    <rect x="0"   y="0"   width="56" height="72" rx="8" fill="#FFFFFF" opacity="0.95"/>
    <rect x="0"   y="84"  width="56" height="112" rx="8" fill="#FFFFFF" opacity="0.9"/>
    <rect x="0"   y="208" width="56" height="20" rx="6" fill="#FFFFFF" opacity="0.85"/>

    <!-- Column 2 -->
    <rect x="68"  y="0"   width="56" height="112" rx="8" fill="#F8FAFC" opacity="0.95"/>
    <rect x="68"  y="124" width="56" height="104" rx="8" fill="#FFFFFF" opacity="0.9"/>

    <!-- Column 3 -->
    <rect x="136" y="0"   width="56" height="56" rx="8" fill="#FFFFFF" opacity="0.95"/>
    <rect x="136" y="68"  width="56" height="84" rx="8" fill="#F8FAFC" opacity="0.92"/>
    <rect x="136" y="160" width="56" height="68" rx="8" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- Subtle grid outlines (decorative) -->
  <g transform="translate(28,28)" opacity="0.15">
    <rect x="0"   y="0"   width="56" height="228" rx="8" fill="none" stroke="#0B1220" stroke-width="2"/>
    <rect x="68"  y="0"   width="56" height="228" rx="8" fill="none" stroke="#0B1220" stroke-width="2"/>
    <rect x="136" y="0"   width="56" height="228" rx="8" fill="none" stroke="#0B1220" stroke-width="2"/>
  </g>

  <!-- MK Monogram -->
  <g transform="translate(28,28)">
    <text x="200" y="216" text-anchor="end"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial"
          font-size="24" font-weight="800" fill="#000000" opacity="0.92">
      MK
    </text>
  </g>
</svg>
